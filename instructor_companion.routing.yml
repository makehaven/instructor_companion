instructor_companion.become_instructor:
  path: '/become-instructor'
  defaults:
    _controller: '\Drupal\instructor_companion\Controller\BecomeInstructorController::build'
    _title: 'Become a MakeHaven Instructor'
  requirements:
    _user_is_logged_in: 'TRUE'

instructor_companion.course_picker:
  path: '/become-instructor/courses'
  defaults:
    _controller: '\Drupal\instructor_companion\Controller\CoursePickerController::build'
    _title: 'Workshops Available to Teach'
  requirements:
    _user_is_logged_in: 'TRUE'

instructor_companion.prospective_instructors:
  path: '/admin/people/prospective-instructors'
  defaults:
    _controller: '\Drupal\instructor_companion\Controller\ProspectiveInstructorsController::build'
    _title: 'Prospective Instructors'
  requirements:
    _permission: 'administer users'

instructor_companion.proposals_list:
  path: '/admin/structure/proposals'
  defaults:
    _controller: '\Drupal\Core\Controller\TitleResolver'
    _title: 'Pending Proposals'
  requirements:
    _permission: 'create civicrm_event entities'

instructor_companion.proposal_review:
  path: '/admin/structure/proposals/{event_id}/review'
  defaults:
    _controller: '\Drupal\instructor_companion\Controller\ProposalReviewController::build'
    _title: 'Review Proposal'
  requirements:
    _permission: 'create civicrm_event entities'
    event_id: '\d+'

instructor_companion.proposal_approve:
  path: '/admin/structure/proposals/{event_id}/approve'
  defaults:
    _controller: '\Drupal\instructor_companion\Controller\ProposalReviewController::approve'
    _title: 'Approve Proposal'
  requirements:
    _permission: 'create civicrm_event entities'
    event_id: '\d+'

instructor_companion.proposal_deny:
  path: '/admin/structure/proposals/{event_id}/deny'
  defaults:
    _form: '\Drupal\instructor_companion\Form\ProposalDenyForm'
    _title: 'Deny Proposal'
  requirements:
    _permission: 'create civicrm_event entities'
    event_id: '\d+'

instructor_companion.dashboard:
  path: '/instructor/dashboard'
  defaults:
    _controller: '\Drupal\instructor_companion\Controller\InstructorDashboardController::build'
    _title: 'Instructor Dashboard'
  requirements:
    _permission: 'access instructor dashboard'

instructor_companion.settings:
  path: '/admin/config/makerspace/instructor-companion'
  defaults:
    _form: '\Drupal\instructor_companion\Form\SettingsForm'
    _title: 'Instructor Companion'
  requirements:
    _permission: 'administer site configuration'

instructor_companion.course_merge_form:
  path: '/admin/structure/courses/merge/{source_nid}'
  defaults:
    _form: '\Drupal\instructor_companion\Form\CourseMergeForm'
    _title: 'Merge Workshop'
  requirements:
    _permission: 'create civicrm_event entities'

instructor_companion.course_merge_execute:
  path: '/admin/structure/courses/merge/{source_nid}/{target_nid}'
  defaults:
    _controller: '\Drupal\instructor_companion\Controller\CourseMergeController::merge'
    _title: 'Merge Courses'
  requirements:
    _permission: 'create civicrm_event entities'

instructor_companion.event_reassign_form:
  path: '/admin/structure/courses/reassign-event/{event_id}'
  defaults:
    _form: '\Drupal\instructor_companion\Form\EventReassignForm'
    _title: 'Move Event to Course'
  requirements:
    _permission: 'create civicrm_event entities'

instructor_companion.workshop_proposal_queue:
  path: '/admin/workshop-proposals'
  defaults:
    _controller: '\Drupal\instructor_companion\Controller\WorkshopProposalQueueController::build'
    _title: 'Workshop Proposal Queue'
  requirements:
    _permission: 'administer webform submission'

instructor_companion.instructor_interest_queue:
  path: '/admin/instructor-interest'
  defaults:
    _controller: '\Drupal\instructor_companion\Controller\InstructorInterestQueueController::build'
    _title: 'Instructor Interest Queue'
  requirements:
    _permission: 'administer webform submission'

instructor_companion.event_reassign_execute:
  path: '/admin/structure/courses/reassign-event/{event_id}/{target_nid}'
  defaults:
    _controller: '\Drupal\instructor_companion\Controller\EventReassignController::reassign'
    _title: 'Moving Event'
  requirements:
    _permission: 'create civicrm_event entities'
